<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian International — Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="Meridian International — Hong Kong-registered China sourcing and procurement agency. Site coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
    }

    body {
      background: #0C2340;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      font-family: 'DM Sans', sans-serif;
    }

    .coming-soon {
      text-align: center;
      max-width: 560px;
    }

    .wordmark {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #C4973B;
      margin-bottom: clamp(2.5rem, 6vw, 4rem);
    }

    .heading {
      font-family: 'Libre Baskerville', serif;
      font-weight: 700;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      color: #F4F1EB;
      line-height: 1.2;
      margin-bottom: 1.25rem;
    }

    .subheading {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.95rem, 1.6vw, 1.15rem);
      color: rgba(61, 79, 95, 0.85);
      line-height: 1.6;
      margin-bottom: clamp(2.5rem, 6vw, 4rem);
    }

    .contact-line {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.8rem, 1.2vw, 0.9rem);
      color: rgba(244, 241, 235, 0.7);
    }

    .contact-line a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(244, 241, 235, 0.3);
    }

    .contact-line a:hover {
      border-bottom-color: rgba(244, 241, 235, 0.7);
    }
  </style>
</head>
<body>
  <main class="coming-soon">
    <p class="wordmark">Meridian International</p>
    <h1 class="heading">Coming Soon</h1>
    <p class="subheading">We're putting the finishing touches on something exceptional.</p>
    <p class="contact-line">In the meantime, reach us at <a href="mailto:enquiries@meridianinternational.io">enquiries@meridianinternational.io</a></p>
  </main>
</body>
</html>
